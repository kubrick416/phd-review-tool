<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="考博复习">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c96442">
<title>考博复习工具</title>
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ebe5d9;
  --card: #ffffff;
  --card2: #faf8f4;
  --accent: #c96442;
  --accent-light: #f0ddd4;
  --text: #2d2a26;
  --text2: #6b6560;
  --text3: #9a9590;
  --green: #2e7d5b;
  --green-light: #e0f0e8;
  --yellow: #b8860b;
  --yellow-light: #fdf4e0;
  --red-light: #fde8e4;
  --border: #e0dbd4;
  --radius: 16px;
  --font: "Söhne", -apple-system, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }

/* Header */
.header {
  text-align: center;
  padding: 28px 0 16px;
}
.header h1 { font-size: 1.6em; margin-bottom: 6px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.header .sub { color: var(--text2); font-size: 0.95em; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 10px;
  margin: 20px 0;
  overflow-x: auto;
}
.stat-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 18px;
  font-size: 0.9em;
  white-space: nowrap;
  flex-shrink: 0;
  color: var(--text2);
}
.stat-chip .num { color: var(--accent); font-weight: 700; }

/* Tab bar */
.tab-bar {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px;
  margin-bottom: 20px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.tab {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  border-radius: 12px;
  font-size: 0.95em;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: none;
  color: var(--text3);
  font-weight: 500;
  font-family: var(--font);
}
.tab.active {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(201,100,66,0.3);
}

/* Module filter */
.module-filter {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.mod-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 0.88em;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}
.mod-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 500; }

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  border-left: 4px solid var(--accent);
  animation: fadeIn 0.3s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.card-label {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 0.82em;
  padding: 4px 12px;
  border-radius: 6px;
  margin-bottom: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.card h3 { font-size: 1.15em; margin-bottom: 14px; line-height: 1.6; font-weight: 600; color: var(--text); }
.card p, .card li { font-size: 1em; line-height: 1.8; color: var(--text2); }
.card ul { padding-left: 20px; margin-top: 8px; }

/* Answer area */
.answer-box {
  background: var(--green-light);
  border-radius: 12px;
  padding: 18px;
  margin-top: 16px;
  display: none;
  border: 1px solid #c8e0d4;
}
.answer-box.show { display: block; animation: fadeIn 0.3s; }
.answer-box h4 { color: var(--green); font-size: 0.95em; margin-bottom: 10px; font-weight: 600; }
.answer-box p, .answer-box li { font-size: 0.95em; line-height: 1.8; color: #3a5a4a; }

/* Buttons */
.btn {
  display: inline-block;
  padding: 11px 22px;
  border-radius: 12px;
  border: none;
  font-size: 0.95em;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
  font-family: var(--font);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.05); }
.btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-small { padding: 8px 16px; font-size: 0.9em; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

/* Flashcard */
.flashcard-container { perspective: 1000px; margin-bottom: 16px; }
.flashcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  backface-visibility: hidden;
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
}
.flashcard-back { transform: rotateY(180deg); }
.flashcard-front h3 { font-size: 1.2em; line-height: 1.7; font-weight: 600; color: var(--text); }
.flashcard-front .hint { color: var(--text3); font-size: 0.88em; margin-top: 16px; }
.flashcard-back p { font-size: 1em; line-height: 1.8; color: var(--text2); text-align: left; }
.flashcard-back .concept-tag { color: var(--accent); font-size: 0.85em; margin-bottom: 10px; font-weight: 600; }
.flashcard-nav { display: flex; justify-content: center; gap: 14px; margin-top: 14px; align-items: center; }
.flashcard-counter { color: var(--text3); font-size: 0.95em; }

/* Writing */
.writing-prompt {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  border-left: 4px solid var(--yellow);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.writing-prompt h3 { color: var(--text); margin-bottom: 12px; font-size: 1.15em; font-weight: 600; line-height: 1.6; }
.writing-area {
  width: 100%;
  min-height: 220px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  color: var(--text);
  font-size: 1em;
  line-height: 1.9;
  resize: vertical;
  font-family: var(--font);
  margin-bottom: 12px;
}
.writing-area:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,100,66,0.1); }
.guide-box {
  background: var(--yellow-light);
  border: 1px solid #e8dcc0;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 16px;
  display: none;
}
.guide-box.show { display: block; animation: fadeIn 0.3s; }
.guide-box h4 { color: var(--yellow); font-size: 0.95em; margin-bottom: 10px; font-weight: 600; }
.guide-box p, .guide-box li { font-size: 0.95em; line-height: 1.8; color: #5a4a2a; }
.guide-box ol { padding-left: 20px; }

/* Progress */
.progress-ring {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.ring-visual {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: conic-gradient(var(--green) var(--pct, 0%), var(--border) 0%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ring-inner { width: 42px; height: 42px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 0.85em; font-weight: 700; color: var(--text); }

/* Glossary */
.glossary-search {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--card);
  color: var(--text);
  font-size: 1em;
  font-family: var(--font);
  margin-bottom: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.glossary-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,100,66,0.1); }
.glossary-cat-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.glossary-cat-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 0.86em;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}
.glossary-cat-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 500; }
.glossary-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: all 0.2s;
}
.glossary-header {
  padding: 18px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
}
.glossary-header:hover { background: var(--bg2); }
.glossary-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.glossary-term {
  font-weight: 600;
  font-size: 1.05em;
  color: var(--text);
  flex: 1;
}
.glossary-term-en {
  color: var(--text3);
  font-size: 0.88em;
  font-weight: 400;
  margin-left: 6px;
}
.glossary-school {
  font-size: 0.78em;
  color: var(--text3);
  white-space: nowrap;
}
.glossary-arrow {
  color: var(--text3);
  transition: transform 0.2s;
  font-size: 0.9em;
}
.glossary-item.open .glossary-arrow { transform: rotate(90deg); }
.glossary-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}
.glossary-item.open .glossary-body { display: block; animation: fadeIn 0.25s; }
.glossary-def {
  font-size: 0.98em;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 12px;
}
.glossary-note {
  background: var(--bg);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 0.92em;
  line-height: 1.75;
  color: var(--text2);
}
.glossary-note-label {
  font-weight: 600;
  color: var(--accent);
  font-size: 0.82em;
  margin-bottom: 4px;
}
.glossary-quote {
  background: var(--accent-light);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  padding: 12px 16px;
  font-size: 0.93em;
  line-height: 1.8;
  color: var(--text);
  margin: 12px 0;
  font-style: italic;
}
.glossary-quote-src {
  font-style: normal;
  color: var(--text3);
  font-size: 0.85em;
  margin-top: 6px;
  display: block;
  text-align: right;
}
.glossary-count {
  text-align: center;
  color: var(--text3);
  font-size: 0.88em;
  padding: 10px 0;
}

/* Hidden */
.hidden { display: none; }

/* Responsive */
@media (max-width: 400px) {
  .tab { font-size: 0.82em; padding: 10px 4px; }
  .card { padding: 20px; }
}

/* Self-check rating buttons */
.rating-btns { display:flex; gap:10px; margin-top:14px; }
.rate-btn {
  flex:1; padding:10px; border-radius:12px; border:none; font-size:0.92em; cursor:pointer;
  font-weight:600; transition: all 0.15s; font-family: var(--font);
}
.rate-bad { background: var(--red-light); color: #b5453a; }
.rate-ok { background: var(--yellow-light); color: #8a6d20; }
.rate-good { background: var(--green-light); color: var(--green); }
.rate-btn:active { transform: scale(0.97); }

/* Quiz mode */
.quiz-options { margin-top: 16px; }
.quiz-opt {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  margin-bottom: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 1em;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.6;
  font-family: var(--font);
}
.quiz-opt:hover { border-color: var(--accent); background: var(--accent-light); }
.quiz-opt.correct { border-color: var(--green); background: var(--green-light); }
.quiz-opt.wrong { border-color: #c0453a; background: var(--red-light); }
.quiz-opt.disabled { pointer-events: none; opacity: 0.8; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>考博复习工具</h1>
    <div class="sub">哲学 · 表演学 · 电影史 · 随时随地</div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('quiz')">问答</button>
    <button class="tab" onclick="switchTab('flash')">闪卡</button>
    <button class="tab" onclick="switchTab('glossary')">词典</button>
    <button class="tab" onclick="switchTab('write')">论述</button>
    <button class="tab" onclick="switchTab('progress')">进度</button>
  </div>

  <div class="module-filter" id="moduleFilter"></div>

  <!-- Quiz Panel -->
  <div id="panel-quiz"></div>
  <!-- Flash Panel -->
  <div id="panel-flash" class="hidden"></div>
  <!-- Glossary Panel -->
  <div id="panel-glossary" class="hidden"></div>
  <!-- Write Panel -->
  <div id="panel-write" class="hidden"></div>
  <!-- Progress Panel -->
  <div id="panel-progress" class="hidden"></div>
</div>

<script>
// ============ DATA ============

const MODULES = [
  { id: 'stan', name: '斯坦尼体系', short: '斯坦尼', color: '#e94560' },
  { id: 'chekhov', name: '契诃夫方法', short: '契诃夫', color: '#0f3460' },
  { id: 'method', name: '方法派', short: '方法派', color: '#533483' },
  { id: 'compare', name: '三大体系', short: '三大体系', color: '#4ecca3' },
  { id: 'perform', name: '人类表演学', short: '表演学', color: '#ffc857' },
  { id: 'china', name: '中国表演理论', short: '中国理论', color: '#e07c24' },
  { id: 'tech', name: '技术哲学', short: '技术哲学', color: '#2d6cdf' },
  { id: 'grotowski', name: '格洛托夫斯基', short: '格洛托夫斯基', color: '#8b4513' },
  { id: 'suzuki', name: '铃木忠志', short: '铃木忠志', color: '#556b2f' },
  { id: 'barba', name: '巴尔巴戏剧人类学', short: '巴尔巴', color: '#4a708b' },
];

// Flashcards data
const flashcards = [
  // 斯坦尼体系
  { module:'stan', q:'体系的三大哲学原则是什么？', a:'1) 能动性与行动原则——动作是表演的基础；2) 有机天性原则——遵循人的自然生命规律；3) "通过有意识达到下意识"——系统训练为灵感铺路。' },
  { module:'stan', q:'"魔术般的假使"(Magic If) 是什么？', a:'演员创造活动的起点。通过自问"假如我处在角色的情境中，我会怎么做"来启动有机创作。它不强迫相信虚假，而是通过假设激发想象力。与规定情境的关系：假使提出假设，规定情境提供具体内容。' },
  { module:'stan', q:'注意力的"三个圈"是什么？', a:'小圈：注意力集中在自身或手中物件上（最私密）；中圈：扩展到对手和局部舞台空间；大圈：涵盖整个舞台乃至观众席。训练目标是实现"当众孤独"。' },
  { module:'stan', q:'"最高任务"与"贯穿动作"的关系？', a:'最高任务是全剧追求的终极精神目标，是指南针和天花板；贯穿动作是角色为实现最高任务而执行的贯穿全剧的不间断意志行动线，是脊椎。比喻：散落的珍珠（单元任务）被一根线（贯穿动作）穿起来，指向最高任务。' },
  { module:'stan', q:'形体动作方法的核心逻辑是什么？', a:'斯坦尼晚年突破：从具体的形体动作入手，在正确规定情境中执行，由此自然激发内在心理体验。核心逆转：早期"由内到外"→晚期"由外到内"。形体动作的"小小真实"能带来体验的"大真实"。' },
  { module:'stan', q:'角色创造的三个阶段？', a:'认识（初读剧本的直觉印象+理性分析）→ 体验（在排练中通过假使和规定情境"活"起来）→ 体现（将内部体验通过声音、形体、节奏传达给观众）。体验是基础，体现是目的。' },
  { module:'stan', q:'什么是"潜台词"？', a:'隐藏在台词文字背后的、未说出口的真实含义和心理动机。角色说的话（文本）和角色想的事（潜台词）往往不一致甚至相反。斯坦尼："观众来到剧院不是为了听文字，而是为了看文字后面的东西。"' },
  { module:'stan', q:'"内在驱动力"的三大力量？', a:'智慧（理性分析）、意志（追求目标、克服障碍）、情感（对情境的真实感受）。三者必须协调：只有理智则冰冷，只有情感则无方向，只有意志则盲目。' },
  { module:'stan', q:'什么是"肌肉监督员"？', a:'一种始终在后台运行的内部监控意识，随时发现并消除多余肌肉紧张。松弛不是目的而是条件——身体松弛了，情感和动作才能自由流动。它与注意力集中互为表里。' },
  { module:'stan', q:'情感记忆的两条唤起路径？', a:'1) 从情感到刺激物：先回忆强烈情感，再追溯引发该情感的具体情境；2) 从刺激物到情感：先回忆具体感官细节（声音、气味、画面），由此唤醒关联情感。注：斯坦尼晚年弱化了对情感记忆的依赖，转向形体动作方法。' },

  // 契诃夫方法
  { module:'chekhov', q:'什么是"心理姿态"(Psychological Gesture, PG)？', a:'用一个全身性的肢体动作凝缩角色的内在意志。是迈克尔·契诃夫方法的核心工具，帮助演员快速进入角色——通过身体找到角色的心理本质。' },
  { module:'chekhov', q:'契诃夫方法的"四兄弟"是什么？', a:'轻松感（Ease）、形式感（Form）、美感（Beauty）、整体感（Entirety）——演员创作的四个基本品质。' },
  { module:'chekhov', q:'"辐射"(Radiation)在契诃夫方法中指什么？', a:'能量的投射与接收。演员通过身体向外投射内在能量，同时接收外部环境和对手的能量。这是表演交流的能量基础。' },
  { module:'chekhov', q:'契诃夫的"气氛"概念？', a:'Atmosphere——演员如何创造和利用空间气氛。气氛不是布景或灯光创造的，而是演员通过内在想象和外在行动共同营造的。气氛先于个人情感存在。' },

  // 方法派
  { module:'method', q:'方法派三大传承人及其核心分歧？', a:'斯特拉斯伯格：强调"感官记忆"和"情感记忆"（从个人经历中提取情感）；阿德勒：批判情感记忆，强调"想象力"与"规定情境"（想象角色的世界而非回忆自己的经历）；迈斯纳：发明"重复练习"，强调"真实冲动"和对对手的真实反应。' },
  { module:'method', q:'方法派与斯坦尼体系的渊源？', a:'美国实验剧团（Group Theatre, 1931）由哈罗德·克勒曼、李·斯特拉斯伯格、谢丽尔·克劳福德创立，将斯坦尼早期体系引入美国。但三大传承人对斯坦尼的理解和发展各不相同，形成了方法派的三支流派。' },
  { module:'method', q:'迈斯纳的"重复练习"是什么？', a:'两名演员面对面，一人描述对方的行为或状态，另一人重复这句话。通过反复练习，训练演员：1）真实地观察对手；2）从对手身上获得冲动而非自我内部制造；3）建立真实的即时反应。核心理念："活在对手的眼睛里"。' },

  // 三大体系
  { module:'compare', q:'三大表演体系在"演员与角色关系"上的区别？', a:'斯坦尼：化身为角色（第一自我消融）；布莱希特：演员与角色保持距离（双重形象）；中国戏曲：程式化表演中"出入"自如。' },
  { module:'compare', q:'布莱希特"间离效果"的精准定义？', a:'通过艺术手段使本来熟悉的事物变得"陌生"和"令人惊异"，打破观众思维惰性，迫使重新审视社会关系。间离≠疏离——目的不是远离戏剧，而是与惯性认知拉开距离。布莱希特不反对一切情感，反对的是情感替代思考。' },
  { module:'compare', q:'布莱希特"街头事故目击者"比喻？', a:'一个人在街头向围观者描述他目睹的车祸。他会模仿司机和行人的动作，但不试图"变成"他们——始终是"展示者"，且展示带有明确目的（证明谁有过错）。这就是布莱希特要求的演员状态。' },
  { module:'compare', q:'梅耶荷德"生物力学"的核心公式？', a:'N = A1 + A2。A1=意图（构思），A2=实现（体现），N=反应（自然涌现的情感）。关键：情感不是出发点而是结果——先正确行动，情感随之而来。与斯坦尼晚期形体动作方法高度一致。' },
  { module:'compare', q:'生物力学动作三阶段？', a:'制动（Otkaz）→ 发送（Posyl）→ 定位（Tochka）。制动：先向相反方向做预备动作，为动作蓄力；发送：释放能量为明确行动；定位：动作终点的短暂静止和控制。与中国戏曲"起、行、收"惊人相似。' },

  // 中国表演理论
  { module:'china', q:'中国戏曲表演"十六字精华"？', a:'虚实结合、形神兼备、设身处地、似我非我。逻辑递进：虚实结合（表演与世界的关系）→形神兼备（身体与精神的关系）→设身处地（演员与角色的关系）→似我非我（自我与他者的关系）。' },
  { module:'china', q:'"似我非我"如何超越斯坦尼与布莱希特？', a:'既不是斯坦尼的完全成为角色，也不是布莱希特的完全间离——是中国式第三路径。角色中有"我"的真实体验（似我），但"我"已被角色转化（非我）。与Phelan表演本体论对话：表演者同时"在场"和"缺席"。' },
  { module:'china', q:'焦菊隐的"心象说"是什么？', a:'焦菊隐将斯坦尼体系与中国戏曲传统结合的创造性贡献。演员在接触角色后，内心会形成一个角色的"心象"（内心形象），这个心象是角色从演员自身有机天性中生长出来的结果。这是北电体系的独特贡献，也是斯坦尼体系中国化的标志成果。' },
  { module:'china', q:'赵宁宇的学术背景和核心位置？', a:'北京电影学院表演学院教授、博导，戏剧艺术研究院院长。兼具导演、演员、学者三重身份。主要著作：《表演技术新论》《产业化生存》。核心话题：斯坦尼体系中国传播史、数字时代表演新挑战、中国电影表演民族化。⚠️ 报考博导，必须精读其著作。' },

  // 人类表演学
  { module:'perform', q:'谢克纳"广义表演"的含义？', a:'表演不限于舞台，包括仪式、运动、日常生活、政治等。表演七大功能：娱乐、建构美与身份、标记或改变身份、建造社群、治愈、传授与说服、处理神圣与世俗。' },
  { module:'perform', q:'"是/作为表演"(is/as performance)的区分？', a:'"是表演"(is performance)：事物本身就是表演（如戏剧演出、仪式）；"作为表演"(as performance)：用表演的视角去分析本不被视为表演的事物（如政治演讲、日常互动）。这个区分是人类表演学的方法论基石。' },
  { module:'perform', q:'戈夫曼"戏剧论"的核心观点？', a:'厄文·戈夫曼提出日常生活中人人都在"表演"——前台（公开展示的自我）与后台（私密的真实自我）的区分。日常互动是一种"印象管理"。这为谢克纳的广义表演概念提供了社会学基础。' },

  // 技术哲学
  { module:'tech', q:'海德格尔"座架"(Gestell)的含义？', a:'现代技术的本质——一种强行把自然界和一切事物都看作"持存物"(Standing-Reserve)的方式。世界变成巨大的"资源库"。经典对比：风车顺应自然（风吹则转），水电站"座架"自然（强迫河流转化为电力储存）。' },
  { module:'tech', q:'斯蒂格勒"技术化"的核心论点？', a:'人发明了技术，技术同时也发明了人。"谁"(Who/人)和"什么"(What/工具)是相互构成的。例：古人打磨燧石时，燧石被改变，但人的大脑皮层也被燧石改变。技术不是单纯的工具，而是人类自身的构成性要素。' },
  { module:'tech', q:'海德格尔"此在"(Dasein)的三个结构？', a:'被抛性(Thrownness)——无法选择地被"抛"入特定历史和处境，对应表演中的"规定情境"；沉沦(Falling)——随波逐流的非本真状态，对应机械化表演；筹划(Projection)——面向未来的规划，对应"最高任务/贯穿动作"。' },
  { module:'tech', q:'亚里士多德"四因论"是什么？', a:'质料因（由什么构成）、形式因（什么样子）、动力因（谁让它做成的）、目的因（为了什么而存在）。海德格尔"银圣杯"例：银子(质料)→杯形(形式)→银匠(动力)→献祭仪式(目的)。斯蒂格勒认为现代技术中，技术本身变成了目的。' },
  { module:'tech', q:'"本有"(Ereignis)与"座架"的关系？', a:'本有是对抗座架的力量。座架将一切视为技术资源，本有则是人与存在相互认领的源头时刻。比喻：乐谱（存在）+演奏者（人）→音乐响起的瞬间就是本有——两者融合，让音乐显现。在表演中，它是回归有机天性、让情感自然流淌的状态。' },
  { module:'tech', q:'海德格尔的"上手状态"与"在手状态"？', a:'上手状态(Ready-to-hand)：熟练使用工具时，工具与人融为一体，注意不到工具本身——如演员完全入戏；在手状态(Present-at-hand)：工具"坏了"才停下来把它当对象审视——如演员忘词、出戏。' },

  // 格洛托夫斯基
  { module:'grotowski', q:'什么是"质朴戏剧"(Poor Theatre)？', a:'格洛托夫斯基早期（1959-1969）最著名的理论主张。追问"戏剧不可缺少的最低限度是什么"，答案是演员与观众之间活生生的交流。系统剥除布景、灯光、服装、化妆、音响，将戏剧还原为演员身体与观众共在的本质状态。质朴戏剧不是贫穷/简陋的戏剧，而是通过减法抵达本质的哲学立场。' },
  { module:'grotowski', q:'格洛托夫斯基的"否定之路"(Via Negativa)与斯坦尼的区别？', a:'斯坦尼问"我怎样才能做到某种表演状态"（加法路径），格洛托夫斯基问"什么阻碍了我？"（减法路径）。不教演员如何"做"，而是帮演员消除阻碍有机反应涌现的障碍：社会化姿态习惯、防御性肌肉紧张、表演套路化反应、情感自我审查。当障碍拆除后，真实冲动从内在直达外部形式。' },
  { module:'grotowski', q:'"神圣演员"与"完全奉献行动"是什么？', a:'神圣演员(Holy Actor)：不是在表演角色，而是进行彻底的自我揭示——如同宗教献祭，将最隐秘、最脆弱的内在袒露给观众。完全奉献行动(Total Act)：动用全部身心资源，实现内在彻底透明。理想状态是conjunctio oppositorum（对立统一）——即兴与精确同时存在，自发性与结构性互不排斥。' },
  { module:'grotowski', q:'格洛托夫斯基的五个发展阶段？', a:'1）戏剧演出阶段(1957-69)：质朴戏剧实践；2）类戏剧阶段(1970-78)：放弃演出和观众概念，参与性集体活动；3）溯源戏剧(1976-82)：跨文化身体实践研究；4）客观戏剧(1983-86)：在加州大学系统化发现；5）艺乘(1986-99)：最成熟阶段，表演不面向外部观众，用"古老歌唱"引导意识状态变化。继承人：托马斯·理查兹。' },
  { module:'grotowski', q:'"艺乘"(Art as Vehicle)的核心含义？', a:'格洛托夫斯基最后也最成熟的研究阶段（1986-1999），在意大利蓬泰代拉工作中心进行。借用葛吉夫术语，将表演艺术比喻为内在修行的"载具"。表演不面向任何外部观众，唯一目的是行动者自身意识状态的精密转化。核心工具是"古老歌唱"——来自非洲-加勒比传统的仪式性歌曲。本体论突破：表演可以不是为了被看，而是为了行动者自身的内在变革。' },
  { module:'grotowski', q:'格洛托夫斯基如何重构演员-观众关系？', a:'废除传统镜框式舞台，为每部作品设计全新空间配置。《卫城》：观众被围在象征集中营的空间中央；《浮士德博士》：观众坐在长桌旁如同出席最后的晚餐；《忠诚的王子》：观众从高处俯视如同围观手术台。每种空间安排都是对该作品特定演员-观众关系的结构性回答。' },
  { module:'grotowski', q:'格洛托夫斯基的核心方法论特征？', a:'两大特征：1）精确性与有机性的统一——每个动作的轨迹、节奏、力度都严格固定（身体记谱/score），但结构内部必须保持活生生的有机反应，称为"生命之流在细节之河中流淌"；2）师徒传承模式——工作本质上不可文字化，依赖身体到身体的直接传递，无法通过阅读文本来学会。' },

  // 契诃夫方法扩展
  { module:'chekhov', q:'契诃夫的"想象身体"(Imaginary Body)是什么？', a:'演员想象自己拥有一个与自身不同的身体（更高/矮/胖、不同重心、不同行走节奏），然后"穿上"这个想象的身体。价值：同时改变外在（身体使用方式）和内在（心理感受），且是整体性的——一次性获得全新身心存在方式。对影视表演特别有价值，因为没有长期排练时间，需要快速进入角色整体感觉。' },
  { module:'chekhov', q:'契诃夫与斯坦尼在"由何开始"问题上的核心分歧？', a:'斯坦尼早期情感记忆方法要求回忆个人经历来激发角色情感。契诃夫认为这在心理上危险（他自己曾因过度使用情感记忆而精神崩溃），且会将角色情感世界限制在演员个人经验范围内。替代方案：通过想象力和身体行动（心理姿态、想象身体、氛围）来抵达情感——情感不是起点而是终点，不是被"找来的"而是在正确工作中自然"涌现的"。' },
  { module:'chekhov', q:'契诃夫的"运动品质"(Qualities of Movement)有哪些？', a:'四种核心品质：1）塑造(molding)——雕塑般清晰度和力量感，适合坚定权威的角色；2）飘浮(floating)——轻盈而不确定，适合梦幻犹疑的状态；3）飞翔(flying)——自由扩展，适合解放狂喜；4）辐射(radiating)——向外发散能量，适合感染力和领袖气质。演员通过给动作赋予不同品质，快速改变身心状态。' },
  { module:'chekhov', q:'契诃夫的"接受性想象力"与一般想象有何不同？', a:'在契诃夫体系中，想象力不是演员自己"制造"的——图像和人物仿佛有独立生命，演员的任务是向它们敞开自己，让它们"来找自己"。这种接受性想象力(receptive imagination)区别于主动的幻想(fantasy)。与之相关的"创造性个体"概念：每个演员内部有一个超越日常人格的"更高自我"，是演员与角色之间的桥梁。' },

  // 铃木忠志
  { module:'suzuki', q:'铃木方法中"脚的语法"(Grammar of the Feet)是什么？', a:'铃木方法最鲜明的特征。他认为现代生活（坐椅子、穿鞋、乘车）切断了身体与大地的能量连接，导致表现力萎缩。训练中演员赤脚或穿分趾鞋(tabi)，通过跺脚(stomping)、滑行(sliding)、静止站立(stillness)重建与地面的力量连接。跺脚要求将全身重量和意识贯注到与地面的每次撞击，冲击力向上传导激活全身能量系统。' },
  { module:'suzuki', q:'铃木忠志的"动物性能量"(Animal Energy)概念？', a:'前现代社会中人类身体保持的一种生命力——警觉、本能、随时准备行动的状态。传统日本表演形式（能剧的极度集中、歌舞伎的爆发性能量）是其艺术化表达。现代社会的"非动物化"使演员身体变得惰性化，失去控制观众注意力的根本能力。铃木训练目标就是通过高度自觉训练恢复被文明驯服的身体能量。' },
  { module:'suzuki', q:'铃木方法中"静止与集中"的含义？', a:'绝对静止的站立——不是放松的不动，而是高度集中的、内部充满能量流动的静止。来源于能剧美学。真正的力量不在运动中，而在静止与运动之间的转换瞬间——称为"构筑"(construction)的时刻。绝对静止突然爆发为运动，或高速运动突然冻结为静止，创造出最强烈的舞台存在感。' },
  { module:'suzuki', q:'铃木训练体系的具体构成？', a:'核心练习：1）基本行走(Basic Walk)——极慢速度、高度控制，每步精确重心转移；2）跺脚(Stomps)——鼓点节奏中爆发性跺脚，训练脚底到头顶能量传导；3）坐姿练习(Sitting/Standing Statues)——从正坐(seiza)出发的起立/坐下/静止保持；4）音乐/文本高强度配合。核心原则：重心放低、骨盆稳定、上半身在下半身稳定基础上自由表达。' },
  { module:'suzuki', q:'铃木方法如何挑战西方表演训练范式？', a:'在斯坦尼-方法派传统中，身体是内在心理状态的"表达工具"；在铃木传统中，身体本身就是表演的主体——不是用身体来表达什么，而是身体的存在方式本身就是表演的全部。他提出"文化的身体"(the body as culture)概念：不同文化的身体使用方式本身就是深层文化表达，现代化正在消灭这种多样性。' },
  { module:'suzuki', q:'铃木忠志与安妮·博加特的合作成果？', a:'合作创建SITI Company，博加特在此基础上发展"视点"方法(Viewpoints)。代表了东方身体训练传统与西方即兴创作方法的跨文化综合——不是简单混合，而是在两种截然不同的身体理解之间寻找创造性张力。' },

  // 巴尔巴戏剧人类学
  { module:'barba', q:'巴尔巴的"前表现性"(Pre-expressivity)概念？', a:'巴尔巴戏剧人类学的核心概念。区分身体使用三个层次：1）日常身体技术——功能性、节省能量；2）超日常身体技术——打破日常习惯的"被决定的"身体使用；3）虚拟化身体技术——杂技特技。"前表现性"是超日常技术中先于任何文化表达内容而存在的身体使用原则。核心论点：不同文化在"如何让身体活起来"的问题上存在跨文化共同原则。' },
  { module:'barba', q:'巴尔巴的"反复出现的原则"有哪些？', a:'四大原则：1）平衡的改变(Altered Balance)——采用非日常平衡，消耗更多能量创造存在感（能剧前倾、芭蕾外开、京剧子午相）；2）对立原则(Opposition)——身体各部分力量对抗（上右下左、头躯反向）；3）能量一致等价——每个动作投入超出功能需要的能量；4）简化原则(Equivalence)——省略日常动作某些阶段来强化核心品质（如能剧滑步）。' },
  { module:'barba', q:'什么是"第三剧场"(Third Theatre)？', a:'巴尔巴区分三种剧场：第一剧场=主流商业剧场，第二剧场=先锋实验剧场，第三剧场=处于社会边缘、由特定社群创造和维持、以集体训练和生活方式为基础的剧团。特点：地理上远离文化中心，通过长期训练发展独特表演语言。欧丁剧团就是典范：位于丹麦小镇、成员来自多国、持续数十年集体训练。不是美学选择而是存在方式。' },
  { module:'barba', q:'巴尔巴的"以物换物"(Barter)概念？', a:'社区戏剧实践概念。欧丁剧团前往陌生社区时，用他们的表演换取当地社区的文化表达（歌曲、舞蹈、仪式等）。建立对等关系：剧团不是来"教化"社区，而是承认社区拥有同等价值的表演传统。' },
  { module:'barba', q:'巴尔巴与格洛托夫斯基的关系？', a:'巴尔巴是格洛托夫斯基最早的学生之一（1961-64年在奥波莱），但理论方向截然不同：格洛托夫斯基越来越走向私密的内在修行（最终到达"艺乘"），巴尔巴始终面向公共表演的创造。巴尔巴的创造植根于跨文化比较研究，深入研究了印度卡塔卡利、巴厘岛舞蹈、能剧、京剧、巴西战舞等。' },
  { module:'barba', q:'巴尔巴戏剧人类学面临的主要批评？', a:'两大批评：1）后殖民批评——"前表现性"隐含西方普遍主义预设，假设存在超文化的身体真理，可能遮蔽不同文化身体实践的根本差异；2）文化挪用风险——从东方传统"提取"前表现性原则，可能将复杂的、内嵌于仪式和信仰体系的身体实践去语境化。这些批评提醒：任何"身体普遍性"的宣称都必须正视身体的文化特殊性。' },

  // 方法派扩展
  { module:'method', q:'阿德勒方法的核心是什么？', a:'核心是想象力训练而非情感记忆。演员不需挖掘个人创伤——需要丰富想象力进入角色的给定情境。例：扮演失去孩子的母亲→不回忆自己的丧亲经历，而是具体想象角色世界（孩子长什么样？住什么房子？最后一次见面穿什么衣服？）。阿德勒还强调文本分析和社会环境研究——表演是社会性行为，须理解角色所处的社会结构和历史语境。' },
  { module:'method', q:'阿德勒的独特历史地位？', a:'唯一一位直接跟随斯坦尼斯拉夫斯基本人学习过的美国表演教师（1934年巴黎）。关键认识：斯坦尼本人晚年已基本放弃情感记忆方法，转向对想象力和给定情境的重视。这使她成为斯特拉斯伯格的主要理论对手。' },
  { module:'method', q:'斯特拉斯伯格方法派的核心练习有哪些？', a:'四大练习：1）放松练习——消除身体紧张区域；2）感官记忆练习——重建过去经历的感官细节（温度、气味、触感）而非情节本身；3）私密时刻练习——在公开场合进行通常独处时才做的私密行为；4）动物练习——模仿动物发现新的身体使用方式。方法派塑造了白兰度、迪恩、帕西诺、德尼罗等影视巨星。' },

const glossary = [
  // ===== 斯坦尼体系 =====
  { cat:'stan', term:'规定情境', en:'Given Circumstances', def:'角色所处的全部客观条件的总和。包括：剧本的情节与事实、时代背景、时间地点、生活环境、导演和演员对剧本的理解、舞美灯光音响等。规定情境不是固定不变的——排练过程中不断丰富和具体化，是演员有机创作的土壤。', quote:'"规定情境，是剧本的情节，剧本的事实、事件，时代，剧情发生的时间和地点，生活条件，演员和导演对剧本的理解，自己对它的补充，演出设计，布景、服装、道具、灯光、音响——这一切都是演员在创作时必须注意的规定情境。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'与"假使"的关系：假使提出假设（"假如我处于……"），规定情境提供假设的具体内容。二者缺一不可。' },
  { cat:'stan', term:'魔术般的假使', en:'Magic If', def:'演员创造活动的起点和激发器。通过自问"假如我处在角色的情境中，我会怎么做？"来启动有机的内心创作过程。它不强迫演员相信舞台上的一切是真的，而是通过假设激发想象力和行动的冲动。', quote:'"'假使'是一个强有力的刺激物。它能启动演员内在的创作……它是创作的杠杆，把演员从现实的领域转到艺术的领域中去。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'假使不要求相信虚假，只要求"真诚地对待"假设。与规定情境的关系：假使提出假设，规定情境提供假设的具体内容。' },
  { cat:'stan', term:'最高任务', en:'Super-Objective / Super-Task', def:'全剧追求的终极精神目标，是剧本和角色存在的根本意义所在。它像指南针一样统领角色的一切行动和体验。所有单元任务和贯穿动作都指向最高任务。最高任务的命名必须用能激发创作热情的动词形式。', quote:'"最高任务——这是一出剧本中一切的一切……剧本和角色中的一切都应当为之服务，一切趋向它，一切为了它而存在。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'比喻：最高任务是灯塔/天花板，贯穿动作是通向它的道路，单元任务是路上的台阶。' },
  { cat:'stan', term:'贯穿动作', en:'Through-Line of Action', def:'角色为实现最高任务而执行的贯穿全剧的不间断意志行动线。它像脊椎一样支撑整个角色，将散落的单元任务串联为有机整体。没有贯穿动作，角色便失去内在统一性。', quote:'"贯穿动作是推动剧本全部创作活动的巨大动脉，没有它，一切就会支离破碎、分散零乱。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'比喻：散落的珍珠（单元任务）被一根线（贯穿动作）穿起来，指向最高任务。贯穿动作是角色的"脊椎"。' },
  { cat:'stan', term:'单元与任务', en:'Units and Objectives', def:'将剧本按事件切分为若干"单元"，每个单元中角色有一个具体的"任务"（目标）。任务的命名规则：必须用动词（"说服他""阻止她"），不能用名词或形容词，因为只有动词才能激发行动。', note:'任务三要素：做什么（任务本身）、为什么做（内在动机）、怎样做（适应方式）。' },
  { cat:'stan', term:'潜台词', en:'Subtext', def:'隐藏在台词文字背后的、未说出口的真实含义和心理动机。角色说的话（文本）和角色想的事（潜台词）往往不一致甚至相反。潜台词是角色内心生活的真正载体，是演员二度创作的核心空间。', quote:'"台词是角色有意识的话语活动，但观众来到剧院不是为了听文字——他们要看到的是文字后面所隐藏的东西。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'潜台词揭示角色言行不一的心理层次，是理解契诃夫剧作和日常化表演的关键工具。' },
  { cat:'stan', term:'交流与适应', en:'Communion and Adaptation', def:'交流：演员与对手之间真实的精神能量往来——发出（辐射）和接收（吸收）。适应：为达到目的而调整与对手交流的方式方法。真实的交流是体验派表演的核心标志。', note:'交流三条线：与对手的交流、与自我的交流（内心独白）、与观众的间接交流（通过"第四面墙"）。' },
  { cat:'stan', term:'情感记忆', en:'Emotion Memory / Affective Memory', def:'演员调动自己过去经历中的真实情感体验，用以丰富角色的情感生活。两条唤起路径：1）从情感到刺激物；2）从刺激物到情感（回忆具体感官细节唤醒关联情感）。', note:'重要：斯坦尼晚年大幅弱化了对情感记忆的依赖，转向"形体动作方法"。方法派三大传承人对情感记忆态度分歧严重。' },
  { cat:'stan', term:'形体动作方法', en:'Method of Physical Actions', def:'斯坦尼晚年最重大的理论突破。核心逻辑：从具体的、有目的的形体动作入手，在正确的规定情境中执行，由此自然激发内在心理体验。实现了从早期"由内到外"到晚期"由外到内"的根本转向。', quote:'"不要等待情感。径直开始行动吧。假如你的行动是正确的、合乎逻辑的，情感自然会产生。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基（转引自B·E·扎哈瓦《斯坦尼斯拉夫斯基及其方法》）</span>', note:'形体动作的"小小真实"能带来体验的"大真实"。此方法对后世影响深远——格洛托夫斯基、巴尔巴等均从此发展。' },
  { cat:'stan', term:'内在驱动力', en:'Inner Motive Forces', def:'推动角色行动的三大内在力量：智慧（理性分析）、意志（追求目标、克服障碍）、情感（对情境的真实感受）。三者必须协调运作。', note:'只有理智则冰冷，只有情感则无方向，只有意志则盲目。健全的创作需要三者有机统一。' },
  { cat:'stan', term:'注意力集中', en:'Concentration of Attention', def:'演员在舞台上将注意力集中于特定对象的能力。分为三个"圈"：小圈（自身或手中物件）、中圈（对手和局部空间）、大圈（整个舞台乃至观众席）。训练终极目标是实现"当众孤独"。', quote:'"当众孤独——就是在众人面前把注意力集中在自己所选定的对象上，而不为剧场中发生的任何事情所分散。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'注意力集中与肌肉松弛互为表里——紧张的肌肉会锁死感受通道、分散注意力。' },
  { cat:'stan', term:'肌肉松弛 / 肌肉监督员', en:'Muscular Release / Muscular Controller', def:'"肌肉监督员"是一种始终在后台运行的内部监控意识，随时发现并消除多余的肌肉紧张。松弛不是目的而是条件——身体松弛了，情感和动作才能自由流动。', note:'与注意力集中互为表里——紧张的肌肉会锁死情感通道，分散注意力。' },
  { cat:'stan', term:'有机天性', en:'Organic Nature', def:'斯坦尼体系的第二哲学原则。表演必须遵循人的自然生命规律，不违背人体和心灵的有机运作方式。一切技术训练的目的是回归和释放有机天性，而非强加人为模式。', quote:'"我们整个'体系'归根到底只是为了一件事——引导演员的创作天性对角色进行有机的创造。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'与第三原则"通过有意识达到下意识"互为因果：系统训练（有意识）为有机天性的自由流露（下意识）铺路。' },
  { cat:'stan', term:'体验与体现', en:'Experiencing and Embodiment', def:'体验(Perezhivanie)：演员在角色的规定情境中产生真实的内心感受和心理过程。体现(Voploshchenie)：将内部体验通过声音、形体、节奏等外部手段传达给观众。体验是基础，体现是目的。二者辩证统一，缺一不可。', quote:'"体验——就是在舞台上按照角色的逻辑，在角色的规定情境中，正确地、合理地、始终如一地、按人的方式去思想、希望、追求、行动。"<span class=\"glossary-quote-src\">——斯坦尼斯拉夫斯基《演员自我修养》</span>', note:'没有体验的体现是空洞形式主义，没有体现的体验是私人感受无法传达。体验派≠"动真情"，而是在规定情境中有机行动。' },

  // ===== 契诃夫方法 =====
  { cat:'chekhov', term:'心理姿态', en:'Psychological Gesture (PG)', def:'用一个全身性的、夸张化的肢体动作来凝缩角色的全部内在意志、情感和欲望。是契诃夫方法最核心的工具。演员先以外化、放大的方式做出PG，再逐步内化——外在动作缩小但内在质感保留。', quote:'"心理姿态是一种手段——用一个能够包含角色全部心灵生活的身体动作，来唤起演员内在的创造性力量。"<span class=\"glossary-quote-src\">——迈克尔·契诃夫《致演员》(To the Actor)</span>', note:'与斯坦尼"形体动作方法"的区别：PG不需要是写实的、可在舞台上执行的动作，它是象征性的、心理性的身体形式。' },
  { cat:'chekhov', term:'想象身体', en:'Imaginary Body', def:'演员想象自己拥有一个与自身不同的身体（更高/矮/胖、不同重心、不同行走节奏），然后"穿上"这个想象的身体。一次性同时改变外在（身体使用方式）和内在（心理感受）。', note:'对影视表演特别有价值——没有长期排练时间时，想象身体帮助演员快速获得角色的整体存在方式。' },
  { cat:'chekhov', term:'四兄弟', en:'Four Brothers', def:'演员创作的四个基本品质：轻松感(Ease)、形式感(Form)、美感(Beauty)、整体感(Entirety)。四者共同构成契诃夫方法追求的表演美学标准。', note:'与斯坦尼追求的"真实/有机"不同，契诃夫更强调艺术性和美学完整性。' },
  { cat:'chekhov', term:'辐射与接收', en:'Radiation and Receiving', def:'演员通过身体向外投射内在能量（辐射），同时接收外部环境和对手的能量（接收）。这是表演交流的能量基础，超越了语言和动作层面的交流。', note:'辐射不是"表演给观众看"，而是内在状态的自然外溢——真实充盈的内在自然会向外辐射。' },
  { cat:'chekhov', term:'气氛', en:'Atmosphere', def:'空间中弥漫的整体情感质地。气氛不是由布景或灯光创造的，而是演员通过内在想象和外在行动共同营造的。在契诃夫体系中，气氛先于个人情感存在——演员进入气氛，气氛唤起情感。', quote:'"气氛是笼罩我们的客观感受——我们走进它，而非创造它。它在那里等着我们，激发出我们的个人情感。"<span class=\"glossary-quote-src\">——迈克尔·契诃夫《致演员》(To the Actor)</span>', note:'与斯坦尼"规定情境"的区别：规定情境是理性分析的条件集合，气氛是直觉感受到的空间情感质地。' },
  { cat:'chekhov', term:'运动品质', en:'Qualities of Movement', def:'四种核心品质：塑造(Molding)——雕塑般清晰有力；飘浮(Floating)——轻盈而不确定；飞翔(Flying)——自由扩展解放；辐射(Radiating)——向外发散能量。', note:'演员通过给动作赋予不同品质，快速改变身心状态，无需依赖情感记忆或心理分析。' },
  { cat:'chekhov', term:'接受性想象力', en:'Receptive Imagination', def:'在契诃夫体系中，想象力不是演员主动"制造"的——图像和角色仿佛有独立生命，演员的任务是向它们敞开自己，让它们"来找自己"。区别于主动的幻想(Fantasy)。', note:'相关概念"创造性个体"(Creative Individuality)：每个演员内部有一个超越日常人格的"更高自我"，是演员与角色之间的桥梁。' },

  // ===== 方法派 =====
  { cat:'method', term:'感官记忆', en:'Sense Memory', def:'斯特拉斯伯格方法派的核心练习。重建过去经历的具体感官细节（温度、气味、触感、声音、视觉）而非情节本身，通过感官通道唤醒相关情感。', note:'与斯坦尼"情感记忆"的区别：斯特拉斯伯格更系统化、更依赖个人心理经历，且将其作为核心方法而非辅助手段。' },
  { cat:'method', term:'重复练习', en:'Repetition Exercise', def:'迈斯纳发明的核心训练。两名演员面对面，一人描述对方的行为或状态，另一人重复。通过反复练习训练：真实观察对手、从对手获得冲动而非自我内部制造、建立真实即时反应。', quote:'"表演的基础是从对手那里获得真实的反应——活在对手给你的东西里。"<span class=\"glossary-quote-src\">——桑福德·迈斯纳《迈斯纳论表演》(Sanford Meisner on Acting)</span>', note:'迈斯纳与斯特拉斯伯格的根本分歧：迈斯纳认为表演的源头在对手身上，而非演员自己的情感记忆库。' },
  { cat:'method', term:'私密时刻练习', en:'Private Moment Exercise', def:'斯特拉斯伯格设计的练习。演员在公开场合进行通常独处时才做的私密行为（唱歌、跳舞、自言自语等），训练在公众面前保持私密状态的真实感。', note:'目的不是"展示隐私"，而是打破"被观看"带来的表演化倾向，找到真正的"当众孤独"。' },
  { cat:'method', term:'想象力方法（阿德勒）', en:'Imagination Technique (Adler)', def:'阿德勒主张演员不需挖掘个人创伤——需要丰富想象力进入角色的规定情境世界。扮演失去孩子的母亲→不回忆自己的丧亲经历，而是具体想象角色世界的每个细节。', note:'阿德勒是唯一直接跟随晚年斯坦尼学习的美国教师（1934巴黎），她证实斯坦尼本人已放弃情感记忆。' },

  // ===== 布莱希特 =====
  { cat:'brecht', term:'间离效果', en:'Verfremdungseffekt / V-Effect', def:'通过艺术手段使本来熟悉的事物变得"陌生"和"令人惊异"，打破观众的思维惰性，迫使其重新审视被习以为常的社会关系和权力结构。间离不等于疏离或冷漠。', quote:'"对一个事件或一个人物进行间离，首先简单地意味着剥去这一事件或人物性格中的理所当然的、众所周知的和显而易见的东西，从而制造出对它的惊愕和新奇感。"<span class=\"glossary-quote-src\">——布莱希特《戏剧小工具篇》</span>', note:'布莱希特不反对一切情感，反对的是情感替代思考。目的是让观众"带着大脑走进剧场"。' },
  { cat:'brecht', term:'社会姿态', en:'Gestus', def:'一种社会编码的身体-态度形式，将权力关系结晶为可被感知的身体形式。不是普通手势(Gesture)，而是凝缩了社会关系的身体表达——每个Gestus都揭示人物的社会位置和阶级关系。', quote:'"所谓'姿态'(Gestus)，指的不是普通的打手势比画，而是一种整体的态度……一种具有社会意义的、可以得出关于社会状况结论的整体态度。"<span class=\"glossary-quote-src\">——布莱希特《论中国人的戏剧表演艺术》</span>', note:'例：老板递给工人一支烟的姿态(Gestus)与朋友之间递烟完全不同——同一动作，不同社会关系。' },
  { cat:'brecht', term:'史诗剧场', en:'Epic Theatre', def:'与亚里士多德式"戏剧剧场"对立的戏剧形式。戏剧剧场追求观众的情感共鸣和认同；史诗剧场追求观众的理性思考和批判意识。叙事代替再现，展示代替化身，论点代替情节。', quote:'"戏剧剧场的观众说：是的，我也有过这样的感受——这是理所当然的——永远如此。史诗剧场的观众说：我从未想到这一点——人们不应当这样做——这使人大吃一惊——必须停止这种事。"<span class=\"glossary-quote-src\">——布莱希特《现代戏剧是史诗性的》</span>', note:'布莱希特自己后来更倾向"辩证剧场"(Dialectical Theatre)这一名称，强调矛盾和变化而非单纯叙事。' },
  { cat:'brecht', term:'街头事故目击者', en:'Street Scene', def:'布莱希特的经典比喻。一个人在街头向围观者描述他目睹的车祸——他会模仿司机和行人的动作，但不试图"变成"他们，始终是"展示者"，且展示带有明确目的（证明谁有过错）。', note:'这就是布莱希特要求的演员状态：不是"我是哈姆雷特"，而是"我向你展示哈姆雷特做了什么"。' },

  // ===== 梅耶荷德 =====
  { cat:'meyerhold', term:'生物力学', en:'Biomechanics', def:'梅耶荷德创立的演员训练体系。核心公式：N = A1 + A2。A1=意图（构思），A2=实现（体现），N=反应（自然涌现的情感）。情感不是出发点而是结果——先正确行动，情感随之而来。', quote:'"演员的艺术在于组织自己的材料，也就是说，在于运用身体正确地表现手段的能力……全部生物力学的前提是：身体一动，意识马上跟上。"<span class=\"glossary-quote-src\">——梅耶荷德（转引自爱德华·布劳恩《梅耶荷德论戏剧》）</span>', note:'与斯坦尼晚期"形体动作方法"高度一致——都认为从身体行动入手比从心理状态入手更有效。' },
  { cat:'meyerhold', term:'动作三阶段', en:'Otkaz-Posyl-Tochka', def:'制动(Otkaz)：先向相反方向做预备动作，为动作蓄力；发送(Posyl)：释放能量，执行明确行动；定位(Tochka)：动作终点的短暂静止和控制。', note:'与中国戏曲"起、行、收"惊人相似。这种结构使每个动作都具有节奏感、力量感和清晰的可读性。' },

  // ===== 格洛托夫斯基 =====
  { cat:'grotowski', term:'质朴戏剧', en:'Poor Theatre', def:'追问"戏剧不可缺少的最低限度是什么"，答案是演员与观众之间活生生的交流。系统剥除布景、灯光、服装、化妆、音响，将戏剧还原为演员身体与观众共在的本质状态。', quote:'"通过逐步排除，我们发现没有化妆、没有服装和布景、没有隔开的表演区、没有灯光和音响效果，戏剧照样可以存在。但如果没有演员与观众之间活生生的、直接的交流关系，戏剧就不能存在。"<span class=\"glossary-quote-src\">——格洛托夫斯基《迈向质朴戏剧》</span>', note:'质朴戏剧不是贫穷/简陋的戏剧，而是通过减法抵达本质的哲学立场——与布鲁克"空的空间"呼应。' },
  { cat:'grotowski', term:'否定之路', en:'Via Negativa', def:'格洛托夫斯基的核心方法论。不教演员如何"做"（加法），而是帮演员消除阻碍有机反应涌现的障碍（减法）：社会化姿态习惯、防御性肌肉紧张、表演套路化反应、情感自我审查。', quote:'"教育不是搜集技巧，而是拆除障碍……重要的不是教会演员什么，而是消除他身上的创作阻力。"<span class=\"glossary-quote-src\">——格洛托夫斯基《迈向质朴戏剧》</span>', note:'与斯坦尼的根本分歧：斯坦尼问"我怎样才能做到？"（加法路径），格洛托夫斯基问"什么阻碍了我？"（减法路径）。' },
  { cat:'grotowski', term:'神圣演员', en:'Holy Actor', def:'不是在"表演角色"，而是进行彻底的自我揭示——如同宗教献祭，将最隐秘、最脆弱的内在袒露给观众。与之对立的是"妓女演员"(Courtesan Actor)——出卖表演技巧取悦观众。', quote:'"演员不应当为观众\'表演\'什么，而应该在观众面前做一次自我揭示的行动——一种彻底的、毫无保留的自我给予。"<span class=\"glossary-quote-src\">——格洛托夫斯基《迈向质朴戏剧》</span>', note:'理想状态是conjunctio oppositorum（对立统一）——即兴与精确同时存在，自发性与结构性互不排斥。' },
  { cat:'grotowski', term:'完全奉献行动', en:'Total Act', def:'动用全部身心资源，实现内在的彻底透明。演员在表演中不保留任何东西，达到完全的自我给予状态。这是格洛托夫斯基对"神圣演员"的实践要求。', note:'这不是"用力表演"，恰恰相反——是拆除所有防御之后，生命力的自然涌出。' },
  { cat:'grotowski', term:'艺乘', en:'Art as Vehicle', def:'格洛托夫斯基最后也最成熟的研究阶段（1986-1999）。借用葛吉夫术语，将表演艺术比喻为内在修行的"载具"(vehicle)。表演不面向任何外部观众，唯一目的是行动者(doer)自身意识状态与能量品质的精密转化。', quote:'"在'艺乘'中，观众席是空的。工作的焦点是行动者(doer)——行动的作品不为了被观看而存在，它本身就是一种对行动者的影响，一种内在过程的精密工具。"<span class=\"glossary-quote-src\">——格洛托夫斯基《从戏剧团体到艺乘》(From the Theatre Company to Art as Vehicle)</span>', note:'核心工具是"古老歌唱"——来自非洲-加勒比传统的仪式性歌曲。继承人：托马斯·理查兹。' },
  { cat:'grotowski', term:'身体记谱', en:'Score (Physical Score)', def:'每个动作的轨迹、节奏、力度都严格固定的身体行动序列。精确性是前提，但结构内部必须保持活生生的有机反应。', note:'格洛托夫斯基的比喻："生命之流在细节之河中流淌"——河道（记谱）是固定的，水流（生命力）是鲜活的。' },

  // ===== 铃木忠志 =====
  { cat:'suzuki', term:'脚的语法', en:'Grammar of the Feet', def:'铃木方法最鲜明的特征。现代生活（坐椅子、穿鞋、乘车）切断了身体与大地的能量连接。通过跺脚(Stomping)、滑行(Sliding)、静止站立(Stillness)等训练重建与地面的力量连接。', note:'跺脚要求将全身重量和意识贯注到与地面的每次撞击，冲击力向上传导激活全身能量系统。' },
  { cat:'suzuki', term:'动物性能量', en:'Animal Energy', def:'前现代社会中人类身体保持的一种生命力——警觉、本能、随时准备行动的状态。传统日本表演形式（能剧的极度集中、歌舞伎的爆发性能量）是其艺术化表达。', note:'现代社会的"非动物化"(De-animalization)使演员身体变得惰性化。铃木训练目标是通过自觉训练恢复被文明驯服的身体能量。' },
  { cat:'suzuki', term:'构筑', en:'Construction', def:'静止与运动之间的转换瞬间。真正的力量不在运动中，而在绝对静止突然爆发为运动、或高速运动突然冻结为静止的那个时刻。这创造出最强烈的舞台存在感。', note:'来源于能剧美学。绝对静止不是放松的不动，而是高度集中的、内部充满能量流动的静止。' },
  { cat:'suzuki', term:'文化的身体', en:'The Body as Culture', def:'铃木的核心理论概念。不同文化的身体使用方式本身就是深层文化表达——身体不是文化的载体，身体就是文化。现代化正在消灭身体使用方式的多样性。', quote:'"我们所说的'文化'，不过是身体如何被使用的不同方式——在某种意义上，身体就是文化本身。现代社会正在通过统一的生活方式消灭这种多样性。"<span class=\"glossary-quote-src\">——铃木忠志《文化就是身体》(Culture Is the Body)</span>', note:'对数字表演研究的启示：数字技术是否在制造"去文化化"的身体？动捕数据抹去了身体的文化特殊性。' },

  // ===== 巴尔巴 =====
  { cat:'barba', term:'前表现性', en:'Pre-expressivity', def:'先于任何具体文化表达内容而存在的身体使用原则。区分三个层次：1）日常身体技术（功能性、节省能量）；2）超日常身体技术（打破日常习惯的"被决定的"身体使用）；3）虚拟化技术（杂技特技）。', quote:'"前表现性层面上的原则，是属于生理层面的——它们先于有意识的、自愿的文化差异而存在。不同传统的表演者为了'使身体活起来'，遵循着某些可以被跨文化辨认的反复出现的原则。"<span class=\"glossary-quote-src\">——尤金尼奥·巴尔巴《戏剧人类学辞典》(A Dictionary of Theatre Anthropology)</span>', note:'核心论点：不同文化传统在"如何让身体活起来"的问题上存在跨文化共同原则——这些共同原则就是"前表现性"。' },
  { cat:'barba', term:'反复出现的原则', en:'Recurring Principles', def:'四大原则：1）平衡的改变(Altered Balance)——非日常平衡创造存在感；2）对立原则(Opposition)——身体各部分力量对抗；3）能量一致(Consistent Energy)——投入超出功能需要的能量；4）简化/等价(Equivalence)——省略日常动作某些阶段。', note:'跨文化例证：能剧前倾、芭蕾外开、京剧子午相——都是"平衡的改变"在不同文化中的体现。' },
  { cat:'barba', term:'第三剧场', en:'Third Theatre', def:'第一剧场=主流商业剧场；第二剧场=先锋实验剧场；第三剧场=处于社会边缘、由特定社群创造维持、以集体训练和生活方式为基础的剧团。不是美学选择而是存在方式。', note:'欧丁剧团是典范：位于丹麦小镇、成员来自多国、持续数十年集体训练。' },
  { cat:'barba', term:'以物换物', en:'Barter', def:'社区戏剧实践概念。欧丁剧团前往陌生社区时，用他们的表演换取当地社区的文化表达（歌曲、舞蹈、仪式等），建立对等的文化交换关系。', note:'核心精神：剧团不是来"教化"社区，而是承认社区拥有同等价值的表演传统。' },
  { cat:'barba', term:'超日常身体技术', en:'Extra-daily Techniques', def:'表演者在舞台上打破日常身体习惯、创造"被决定的"(decided)身体使用方式。不同于日常身体技术（最小消耗达到功能目的）和虚拟化技术（杂技极限）。', note:'所有表演传统的核心都是让身体"非日常化"——这是巴尔巴跨文化比较的方法论基点。' },

  // ===== 中国表演理论 =====
  { cat:'china', term:'虚实结合', en:'Integration of Virtual and Real', def:'十六字精华之一，处理表演与世界的关系。以"无"创造"有"——马鞭代千军，圆场行万里。虚不是空无，而是留白和想象的空间；实不是照搬，而是精炼后的本质。', note:'在数字表演语境下：CGI角色（虚）与真人表演（实）的关系，可以用"虚实结合"来理论化。' },
  { cat:'china', term:'形神兼备', en:'Unity of Form and Spirit', def:'十六字精华之二，处理身体与精神的关系。形=外在身体技术/程式，神=内在精神气韵。不偏废任何一方——既不是纯技术展示，也不是无形式的情感宣泄。', note:'超越了西方"由内到外vs由外到内"的二元对立——在中国美学中，形与神是一体两面。' },

// ============ STATE ============
let currentTab = 'quiz';
let activeModules = new Set(MODULES.map(m => m.id));
let flashIdx = 0;
let flipped = false;

// Persistent state — IndexedDB for iOS reliability, localStorage as fallback
const DB_NAME = 'phdReviewDB';
const DB_VERSION = 1;
const STORE_NAME = 'state';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => { req.result.createObjectStore(STORE_NAME); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  } catch(e) { return undefined; }
}

async function idbSet(key, val) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  } catch(e) { /* fallback handled below */ }
}

function stateToJSON() {
  return {
    flashMastered: [...state.flashMastered],
    flashLearning: [...state.flashLearning],
    quizCorrect: [...state.quizCorrect],
    quizWrong: [...state.quizWrong],
    essayDrafts: state.essayDrafts,
    totalSessions: state.totalSessions,
  };
}

function parseStateJSON(s) {
  return {
    flashMastered: new Set(s.flashMastered || []),
    flashLearning: new Set(s.flashLearning || []),
    quizCorrect: new Set(s.quizCorrect || []),
    quizWrong: new Set(s.quizWrong || []),
    essayDrafts: s.essayDrafts || {},
    totalSessions: (s.totalSessions || 0) + 1,
  };
}

const EMPTY_STATE = { flashMastered: new Set(), flashLearning: new Set(), quizCorrect: new Set(), quizWrong: new Set(), essayDrafts: {}, totalSessions: 1 };

// Load synchronously from localStorage first (for immediate render), then upgrade from IDB
function loadStateSync() {
  try {
    const s = JSON.parse(localStorage.getItem('phd_review_state') || '{}');
    if (s.flashMastered) return parseStateJSON(s);
    return { ...EMPTY_STATE };
  } catch(e) { return { ...EMPTY_STATE }; }
}

async function loadStateFromIDB() {
  const s = await idbGet('phd_review_state');
  if (s && s.flashMastered) {
    const parsed = parseStateJSON(s);
    // Merge: keep whichever has more progress
    if (parsed.flashMastered.size + parsed.quizCorrect.size > state.flashMastered.size + state.quizCorrect.size) {
      Object.assign(state, parsed);
      renderStats();
      renderCurrentPanel();
    }
  }
}

function saveState() {
  const s = stateToJSON();
  // Write to both for maximum persistence
  try { localStorage.setItem('phd_review_state', JSON.stringify(s)); } catch(e) {}
  idbSet('phd_review_state', s);
}

const state = loadStateSync();
// Async upgrade from IDB (in case localStorage was cleared but IDB survived)
loadStateFromIDB();

// ============ HELPERS ============
function filtered(arr) {
  return arr.filter(item => activeModules.has(item.module));
}
function shuffleArray(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
let shuffledFlash = shuffleArray(filtered(flashcards));
let shuffledQuiz = shuffleArray(filtered(quizzes));

function refreshShuffled() {
  shuffledFlash = shuffleArray(filtered(flashcards));
  shuffledQuiz = shuffleArray(filtered(quizzes));
  flashIdx = 0;
  quizIdx = 0;
}

// ============ RENDER ============
function renderStats() {
  const total = flashcards.length + quizzes.length;
  const mastered = state.flashMastered.size + state.quizCorrect.size;
  const pct = total > 0 ? Math.round(mastered / total * 100) : 0;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip">已掌握 <span class="num">${mastered}/${total}</span></div>
    <div class="stat-chip">闪卡 <span class="num">${state.flashMastered.size}/${flashcards.length}</span></div>
    <div class="stat-chip">问答 <span class="num">${state.quizCorrect.size}/${quizzes.length}</span></div>
    <div class="stat-chip">复习 <span class="num">#${state.totalSessions}</span></div>
  `;
}

function renderModuleFilter() {
  document.getElementById('moduleFilter').innerHTML = MODULES.map(m =>
    `<button class="mod-btn ${activeModules.has(m.id)?'active':''}" onclick="toggleModule('${m.id}')">${m.short}</button>`
  ).join('');
}

function toggleModule(id) {
  if(activeModules.has(id)) {
    if(activeModules.size > 1) activeModules.delete(id);
  } else {
    activeModules.add(id);
  }
  renderModuleFilter();
  refreshShuffled();
  renderCurrentPanel();
}

const ALL_TABS = ['quiz','flash','glossary','write','progress'];

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ALL_TABS[i] === tab);
  });
  ALL_TABS.forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('hidden', t !== tab);
  });
  // Hide module filter on glossary tab (it has its own category filter)
  document.getElementById('moduleFilter').style.display = tab === 'glossary' ? 'none' : '';
  renderCurrentPanel();
}

function renderCurrentPanel() {
  if(currentTab === 'quiz') renderQuiz();
  else if(currentTab === 'flash') renderFlash();
  else if(currentTab === 'glossary') renderGlossary();
  else if(currentTab === 'write') renderWrite();
  else if(currentTab === 'progress') renderProgress();
}

  // Filter
  let items = glossary;
  if(glossaryCat !== 'all') items = items.filter(g => g.cat === glossaryCat);

function setGlossaryCat(cat) {
  glossaryCat = cat;

}

function toggleGlossaryItem(i) {

// ---- Quiz ----
function renderQuiz() {
  const items = shuffledQuiz;
  if(items.length === 0) { document.getElementById('panel-quiz').innerHTML = '<div class="card"><p>请选择至少一个模块</p></div>'; return; }
  if(quizIdx >= items.length) quizIdx = 0;
  const q = items[quizIdx];
  const qKey = q.q;
  const modInfo = MODULES.find(m=>m.id===q.module);

  document.getElementById('panel-quiz').innerHTML = `
    <div class="card">
      <div class="card-label">${modInfo.name} · ${quizIdx+1}/${items.length}</div>
      <h3>${q.q}</h3>
      <div class="quiz-options" id="quizOpts">
        ${q.opts.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i},${q.correct},'${encodeURIComponent(qKey)}')">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
      </div>
      <div class="answer-box" id="quizExplain">
        <h4>解析</h4>
        <p>${q.explain}</p>
      </div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn btn-outline btn-small" onclick="quizIdx--;if(quizIdx<0)quizIdx=items.length-1;renderQuiz()">上一题</button>
        <button class="btn btn-primary btn-small" onclick="quizIdx++;renderQuiz()">下一题</button>
        <button class="btn btn-outline btn-small" onclick="shuffledQuiz=shuffleArray(filtered(quizzes));quizIdx=0;renderQuiz()">随机</button>
      </div>
    </div>
  `;
}

function answerQuiz(selected, correct, qKeyEncoded) {
  const qKey = decodeURIComponent(qKeyEncoded);
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o,i) => {
    o.classList.add('disabled');
    if(i === correct) o.classList.add('correct');
    if(i === selected && selected !== correct) o.classList.add('wrong');
  });
  document.getElementById('quizExplain').classList.add('show');
  if(selected === correct) {
    state.quizCorrect.add(qKey);
    state.quizWrong.delete(qKey);
  } else {
    state.quizWrong.add(qKey);
  }
  saveState();
  renderStats();
}

// ---- Flashcard ----
function renderFlash() {
  const items = shuffledFlash;
  if(items.length === 0) { document.getElementById('panel-flash').innerHTML = '<div class="card"><p>请选择至少一个模块</p></div>'; return; }
  if(flashIdx >= items.length) flashIdx = 0;
  if(flashIdx < 0) flashIdx = items.length - 1;
  const c = items[flashIdx];
  flipped = false;
  const modInfo = MODULES.find(m=>m.id===c.module);
  const fKey = c.q;
  const isMastered = state.flashMastered.has(fKey);

  document.getElementById('panel-flash').innerHTML = `
    <div class="flashcard-container">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-front">
          <div class="card-label">${modInfo.name}</div>
          <h3>${c.q}</h3>
          <div class="hint">点击翻转查看答案</div>
        </div>
        <div class="flashcard-back">
          <div class="concept-tag">${modInfo.name}</div>
          <p>${c.a}</p>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="btn btn-outline btn-small" onclick="flashIdx--;renderFlash()">上一张</button>
      <span class="flashcard-counter">${flashIdx+1} / ${items.length}</span>
      <button class="btn btn-outline btn-small" onclick="flashIdx++;renderFlash()">下一张</button>
    </div>
    <div class="rating-btns" style="margin-top:10px">
      <button class="rate-btn rate-bad" onclick="rateFlash('${encodeURIComponent(fKey)}','bad')">不熟</button>
      <button class="rate-btn rate-ok" onclick="rateFlash('${encodeURIComponent(fKey)}','ok')">模糊</button>
      <button class="rate-btn rate-good" onclick="rateFlash('${encodeURIComponent(fKey)}','good')">掌握${isMastered?' ✓':''}</button>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-outline btn-small" onclick="shuffledFlash=shuffleArray(filtered(flashcards));flashIdx=0;renderFlash()">随机重排</button>
    </div>
  `;
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
  flipped = !flipped;
}

function rateFlash(keyEncoded, rating) {
  const key = decodeURIComponent(keyEncoded);
  if(rating === 'good') {
    state.flashMastered.add(key);
    state.flashLearning.delete(key);
  } else if(rating === 'ok') {
    state.flashLearning.add(key);
    state.flashMastered.delete(key);
  } else {
    state.flashMastered.delete(key);
    state.flashLearning.delete(key);
  }
  saveState();
  renderStats();
  flashIdx++;
  renderFlash();
}

// ---- Write ----
function renderWrite() {
  const items = filtered(essayPrompts);
  document.getElementById('panel-write').innerHTML = items.map((p,i) => {
    const modInfo = MODULES.find(m=>m.id===p.module);
    const draft = state.essayDrafts[p.title] || '';
    return `
      <div class="writing-prompt">
        <div class="card-label">${modInfo.name}</div>
        <h3>${p.title}</h3>
        <div class="btn-row">
          <button class="btn btn-outline btn-small" onclick="toggleGuide(${i})">查看答题指导</button>
        </div>
        <div class="guide-box" id="guide-${i}">
          <h4>答题框架与关键术语</h4>
          <p style="white-space:pre-wrap">${p.guide}</p>
        </div>
        <textarea class="writing-area" id="draft-${i}" placeholder="在此写下你的答案草稿……" oninput="saveDraft('${encodeURIComponent(p.title)}',this.value)">${draft}</textarea>
        <div style="text-align:right;color:var(--text2);font-size:0.75em" id="wc-${i}">${draft.length} 字</div>
      </div>
    `;
  }).join('') || '<div class="card"><p>请选择至少一个模块</p></div>';
}

function toggleGuide(i) {
  document.getElementById('guide-'+i).classList.toggle('show');
}

function saveDraft(titleEncoded, text) {
  const title = decodeURIComponent(titleEncoded);
  state.essayDrafts[title] = text;
  saveState();
  // Update word count
  const items = filtered(essayPrompts);
  const idx = items.findIndex(p => encodeURIComponent(p.title) === titleEncoded);
  if(idx >= 0) {
    const wcEl = document.getElementById('wc-'+idx);
    if(wcEl) wcEl.textContent = text.length + ' 字';
  }
}

// ---- Progress ----
function renderProgress() {
  const panel = document.getElementById('panel-progress');
  let html = '';

  // Overall
  const total = flashcards.length + quizzes.length;
  const mastered = state.flashMastered.size + state.quizCorrect.size;
  const pct = total > 0 ? Math.round(mastered / total * 100) : 0;
  html += `
    <div class="progress-ring" style="--pct:${pct}%">
      <div class="ring-visual"><div class="ring-inner">${pct}%</div></div>
      <div>
        <div style="font-weight:600">总体进度</div>
        <div style="color:var(--text2);font-size:0.8em">已掌握 ${mastered} / ${total} 个知识点</div>
      </div>
    </div>
  `;

  // Per module
  MODULES.forEach(m => {
    const mFlash = flashcards.filter(f=>f.module===m.id);
    const mQuiz = quizzes.filter(q=>q.module===m.id);
    const mTotal = mFlash.length + mQuiz.length;
    const mMastered = mFlash.filter(f=>state.flashMastered.has(f.q)).length + mQuiz.filter(q=>state.quizCorrect.has(q.q)).length;
    const mPct = mTotal > 0 ? Math.round(mMastered / mTotal * 100) : 0;
    html += `
      <div class="progress-ring" style="--pct:${mPct}%">
        <div class="ring-visual"><div class="ring-inner">${mPct}%</div></div>
        <div>
          <div style="font-weight:600">${m.name}</div>
          <div style="color:var(--text2);font-size:0.8em">闪卡 ${mFlash.filter(f=>state.flashMastered.has(f.q)).length}/${mFlash.length} · 问答 ${mQuiz.filter(q=>state.quizCorrect.has(q.q)).length}/${mQuiz.length}</div>
        </div>
      </div>
    `;
  });

  // Reset button
  html += `
    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-outline btn-small" onclick="if(confirm('确认重置所有进度？')){localStorage.removeItem('phd_review_state');location.reload();}">重置进度</button>
    </div>
  `;
  panel.innerHTML = html;
}

// ============ INIT ============
renderStats();
renderModuleFilter();
renderQuiz();

// Register Service Worker for PWA + offline + data persistence
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
